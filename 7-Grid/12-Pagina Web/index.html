<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <input type="checkbox" id="open-menu" class="header__checkbox" />
      <label for="open-menu" class="header__open-nav-button" role="button"
        >=</label
      >
      <div class="header__logo-container">
        <img src="logo.png" alt="logo" class="header__logo" />
      </div>
      <nav class="header__nav">
        <ul class="header__nav-list">
          <li class="header__nav-item"><a href="#">About</a></li>
          <li class="header__nav-item"><a href="#">Portafolio</a></li>
          <li class="header__nav-item"><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main class="profile">
      <div class="profile__wrapper">
        <div class="profile__img-container">
          <img src="dalto.jpeg" alt="" />
        </div>
        <div class="profile__data-container">
          <div class="profile__data">
            <div class="profile__description">
              <h1>¿Quien es Lucas dalto?</h1>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
