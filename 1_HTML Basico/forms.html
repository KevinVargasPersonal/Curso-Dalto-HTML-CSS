<!DOCTYPE html>
<head>
    <title>Formularios</title>
</head>
<body>
    <form>
        <!--name es para darle un nombre al campo para poder usarlo luego-->
        <!--required es para que no se envíe los datos del form antes de que se complete el llenado-->
        <!--placeholder-->
        <!--minlength es para decirle el tamaño de caracteres minimo que debe tener-->
        <input type="text" name="username">
        <input type="email" required>
        <input type="password" placeholder="password">
        <input type="checkbox" minlength="3">
        <input type="radio">
        <input type="file">
        <input type="color">
        <input type="submit">
    </form>
</body>
</html>
